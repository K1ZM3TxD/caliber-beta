<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Caliber</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <script src="env.js"></script>
  <div id="app">
    <div class="header">
      <span class="logo">Caliber</span>
    </div>
    <h2 id="popup-headline" class="popup-headline" style="display:none"></h2>
    <p id="popup-status" class="status-text">Checking…</p>
    <a id="popup-calibrate" class="btn btn-calibrate" style="display:none" target="_blank" rel="noopener noreferrer">Begin Calibration</a>
    <button id="popup-toggle" class="btn btn-primary" style="display:none">Open Sidecard</button>

    <div id="signal-toggle-section" class="signal-section" style="display:none">
      <hr class="divider">
      <div class="signal-row">
        <span class="signal-label">Signal injection</span>
        <button id="signal-toggle-btn" class="signal-toggle">—</button>
      </div>
      <p id="signal-status" class="signal-status-text"></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
